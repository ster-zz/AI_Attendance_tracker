<div class="panel">
    <div class="panel-hd">
        <div class="panel-title">⚡ Live Activity Feed</div>
        <button class="filter-btn">Filter ▾</button>
    </div>
    <div class="act-list">
        <!-- Placeholder data for now until we have real DB queries for activity -->
        <div class="act-item">
            <span class="act-time">Now</span>
            <span class="act-icon ok">✓</span>
            <div class="act-body">
                <div class="act-title">Dashboard loaded</div>
                <div class="act-detail">Waiting for real activity data.</div>
            </div>
        </div>
        {% if session %}
        <div class="act-item">
            <span class="act-time">{{ session.start_time }}</span>
            <span class="act-icon">▶</span>
            <div class="act-body">
                <div class="act-title">Session #{{ session.session_id }} Started</div>
                <div class="act-detail">Date: {{ session.date }} · Active monitoring ✓</div>
            </div>
        </div>
        {% endif %}
        <div class="act-item">
            <span class="act-time">Boot</span>
            <span class="act-icon">🗄</span>
            <div class="act-body">
                <div class="act-title">System Initialized</div>
                <div class="act-detail">DB connected.</div>
            </div>
        </div>
    </div>
</div>
